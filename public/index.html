<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexChat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <span>NexChat</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Password"
          onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn-primary" onclick="doLogin()"><span id="login-label">Sign In</span></button>
      <div class="auth-error" id="login-err"></div>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="reg-name" placeholder="How others see you"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-user" placeholder="lowercase_no_spaces"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>Choose an Avatar</label>
        <div class="avatar-picker" id="avatar-picker">
          <div class="avatar-opt selected" data-v="🧑">🧑</div>
          <div class="avatar-opt" data-v="👩">👩</div>
          <div class="avatar-opt" data-v="🧔">🧔</div>
          <div class="avatar-opt" data-v="👨‍💻">👨‍💻</div>
          <div class="avatar-opt" data-v="👩‍💻">👩‍💻</div>
          <div class="avatar-opt" data-v="🐱">🐱</div>
          <div class="avatar-opt" data-v="🦊">🦊</div>
          <div class="avatar-opt" data-v="🤖">🤖</div>
        </div>
      </div>
      <button class="btn-primary" onclick="doRegister()"><span id="reg-label">Create Account</span></button>
      <div class="auth-error" id="reg-err"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="app-layout">

    <div class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo"><div class="dot"></div>NexChat</div>
        <div style="display:flex;gap:4px">
          <button class="btn-icon" title="Refresh" onclick="loadUsers()">🔄</button>
          <button class="btn-icon" title="Sign out" onclick="doLogout()">🚪</button>
        </div>
      </div>
      <div class="me-card">
        <div class="avatar-wrap">
          <div class="avatar-circle large" id="my-avatar">🧑</div>
          <div class="status-dot online"></div>
        </div>
        <div class="me-info">
          <div class="me-name" id="my-name">You</div>
          <div class="me-status">● Online</div>
        </div>
      </div>
      <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;padding-right:12px">
  <span>People</span>
  <button class="btn-icon" title="New Group" onclick="showNewGroup()">➕</button>
</div>
<div class="section-label" id="groups-label" style="display:none;justify-content:space-between;align-items:center;padding-right:12px">
  <span>Groups</span>
</div>
<div class="users-list" id="groups-list" style="display:none"></div>
<div class="section-label">People</div>
      <div class="users-list" id="users-list"><div class="list-hint">Connecting…</div></div>
    </div>

    <div class="chat-area">
      <div id="no-chat" style="display:none">
        <div class="no-chat-icon">💬</div>
        <p>Pick a conversation</p>
        <small>Messages travel live across the internet via Socket.io + Firebase</small>
      </div>

      <div id="active-chat" style="display:none; flex-direction:column; height:100%">
        <div class="chat-header">
  <button class="btn-icon mobile-back" onclick="goBackMobile()">‹ Back</button>
          <div class="avatar-wrap">
            <div class="avatar-circle" id="chat-peer-avatar">👤</div>
            <div class="status-dot" id="chat-peer-dot"></div>
          </div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-peer-name">User</div>
            <div class="chat-header-sub" id="chat-peer-sub">Online</div>
          </div>
        </div>

        <div class="messages-area" id="messages-area">
          <div class="list-hint">Loading messages…</div>
        </div>

        <div class="typing-bar" id="typing-bar" style="display:none">
          <span id="typing-name">Someone</span> is typing
          <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>

        <div class="chat-input-area">
          <div class="input-wrap">
            <textarea id="msg-input" rows="1" placeholder="Type a message…"
              onkeydown="handleKey(event)" oninput="autoResize(this); handleTyping()"></textarea>
          </div>
          <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- New Group Modal -->
<div id="group-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:380px;max-width:95vw">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px">👥 New Group</h3>
    <div class="form-group">
      <label>Group Name</label>
      <input type="text" id="group-name" placeholder="e.g. Friends, Work, Family"/>
    </div>
    <div class="form-group">
      <label>Select Members</label>
      <div id="member-checkboxes" style="display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;padding:8px;background:var(--bg);border-radius:8px;border:1px solid var(--border2)"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="closeNewGroup()" style="flex:1;padding:10px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text);cursor:pointer;font-family:var(--font)">Cancel</button>
      <button onclick="createGroup()" style="flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:white;cursor:pointer;font-weight:600;font-family:var(--font)">Create Group</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="https://nexchat-server-w0rj.onrender.com/socket.io/socket.io.js"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>
